# SELF-IMPROVEMENT-WORKFLOW-V1 — the v1 autonomy loop workflow definition.
#
# Fires when a friction pattern's recurrence threshold is exceeded
# (substrate-emitted friction.pattern_frequency_threshold_exceeded,
# produced by FrictionPatternFrequencyEmitter from
# friction.pattern_reactivated events). Drives the v1 autonomy loop:
#
#   1. Record the recurrence on the pattern (audit trail in the
#      friction_pattern_occurrence table).
#   2. Ask CC (claude_code coding session) to address the pattern.
#   3. Pause at approval gate until coding_consult.response_received
#      arrives carrying CC's investigation outcome.
#   4. Read the response.
#   5. Mark the pattern resolved (unconditional in v1 per architect
#      call; v2 may branch on investigation_outcome).
#   6. Emit the autonomy-loop outcome event with CC's actual
#      investigation_outcome — the load-bearing audit-trail signal
#      that distinguishes completed / partial / unable_to_investigate.
#
# Ref grammar (Spec 4 canonical):
#   - {idea_payload.<path>}        trigger event payload refs
#   - {step.<step_id>.value.<path>} step value refs
#   - {workflow.<key>}             fixed placeholders (instance_id, etc.)
#
# Trigger event_selector uses top-level instance_id (engine-trusted
# Event field) + payload.pattern_id (per v7.3 H2 fold).
# instance_id value is substituted at registration time by
# register_self_improvement_workflow (helper substitution pattern
# from v7.3 H2 — top-level instance_id path only).

workflow_id: self_improvement
instance_id: '{installer.instance_id}'
name: Self-improvement autonomy loop
description: |
  v1 autonomy loop. Trigger fires on friction pattern frequency
  threshold; workflow records recurrence, asks CC, awaits response,
  marks resolved, emits outcome.
version: "1.0"
owner: architect
instance_local: true

bounds:
  iteration_count: 1
  wall_time_seconds: 90000

verifier:
  flavor: deterministic
  check: terminated

triggers:
  - event_type: friction.pattern_frequency_threshold_exceeded
    event_selector:
      op: AND
      operands:
        # The top-level event_type filter narrows the trigger to ONLY
        # fire on the canonical autonomy-loop entry event. Without
        # it the composite selector lands in the runtime's unfiltered
        # bucket and matches any event with the AND-tail predicates
        # satisfied (the audit-event payloads also carry pattern_id;
        # the substrate-emitted friction.pattern_reactivated event
        # also matches). Including event_type here keeps the trigger
        # 1:1 with the emitter's translation output.
        - op: eq
          path: event_type
          value: friction.pattern_frequency_threshold_exceeded
        - op: eq
          path: instance_id
          value: '{installer.instance_id}'
        - op: exists
          path: payload.pattern_id

action_sequence:
  - id: record_recurrence
    action_type: call_tool
    parameters:
      tool_id: record_friction_pattern_recurrence
      args:
        pattern_id: '{idea_payload.pattern_id}'
        classified_by: auto-signal-type
    continuation_rules:
      on_failure: abort

  # SELF-IMPROVEMENT-CLOSURE-V1: look up invariants linked to this
  # pattern. If at least one link row exists in
  # friction_pattern_invariant, the closure path runs (probe-
  # verified resolution). If no link, the legacy fallback runs
  # (CC-asked, pattern marked resolved on response — unchanged
  # behavior for unaugmented patterns).
  - id: lookup_invariants
    action_type: call_tool
    parameters:
      tool_id: lookup_pattern_invariants
      args:
        pattern_id: '{idea_payload.pattern_id}'
    continuation_rules:
      on_failure: abort

  - id: branch_on_invariants
    action_type: branch
    parameters:
      condition: '{step.lookup_invariants.value.has_invariants}'
      branch_on_true: record_closure_attempt
      branch_on_false: 'terminal:legacy_fallback:legacy_ask_cc'
    continuation_rules:
      on_failure: abort

  # ─── CLOSURE PATH (main sequence continues) ────────────────────
  - id: record_closure_attempt
    action_type: call_tool
    parameters:
      tool_id: record_closure_attempt
      args:
        pattern_id: '{idea_payload.pattern_id}'
        invariant_id: '{step.lookup_invariants.value.primary_invariant_id}'
        active_epoch: '{idea_payload.active_epoch}'
        route: code_change_via_cc
        route_payload: {}
        probe_kind: deterministic_introspection
        probe_payload: {}
        probe_payload_version: 1
    continuation_rules:
      on_failure: abort

  - id: ask_cc_closure
    action_type: call_tool
    parameters:
      tool_id: ask_coding_session_for_workflow
      args:
        target: claude_code
        question: 'Address recurring friction pattern: {idea_payload.pattern_id} (invariant: {step.lookup_invariants.value.primary_invariant_id})'
        context:
          pattern_id: '{idea_payload.pattern_id}'
          invariant_id: '{step.lookup_invariants.value.primary_invariant_id}'
          closure_id: '{step.record_closure_attempt.value.closure_id}'
          _workflow_execution_id: '{workflow.execution_id}'
          _workflow_gate_nonce: '{workflow.gate_nonce}'
    continuation_rules:
      on_failure: abort
    gate_ref: await_cc_response_closure

  - id: read_response_closure
    action_type: call_tool
    parameters:
      tool_id: read_coding_session_response_for_workflow
      args:
        request_id: '{step.ask_cc_closure.value.request_id}'
    continuation_rules:
      on_failure: abort

  - id: run_closure_probe
    action_type: call_tool
    parameters:
      tool_id: run_closure_probe
      args:
        closure_id: '{step.record_closure_attempt.value.closure_id}'
    continuation_rules:
      on_failure: abort

  # AC10: legacy outcome field preserved with CC's investigation
  # outcome string unchanged; closure_outcome added under
  # extra_payload. Pattern transition to resolved happens INSIDE
  # run_closure_probe on probe pass; on probe fail the pattern
  # stays in current state and closure.probe_failed is emitted.
  - id: emit_outcome_closure
    action_type: call_tool
    parameters:
      tool_id: emit_autonomy_loop_event
      args:
        workflow_id: self_improvement
        outcome: '{step.read_response_closure.value.investigation_outcome}'
        addresses_friction_patterns:
          - '{idea_payload.pattern_id}'
        extra_payload:
          closure_outcome: '{step.run_closure_probe.value.outcome}'
          closure_id: '{step.record_closure_attempt.value.closure_id}'
          invariant_id: '{step.lookup_invariants.value.primary_invariant_id}'
    continuation_rules:
      on_failure: abort

# ─── TERMINAL BRANCH: legacy_fallback ────────────────────────────
# Reached only from branch_on_invariants on False. Cannot fall
# through into main action_sequence after completion.
terminal_branches:
  legacy_fallback:
    - id: legacy_ask_cc
      action_type: call_tool
      parameters:
        tool_id: ask_coding_session_for_workflow
        args:
          target: claude_code
          question: 'Address recurring friction pattern: {idea_payload.pattern_id}'
          context:
            pattern_id: '{idea_payload.pattern_id}'
            _workflow_execution_id: '{workflow.execution_id}'
            _workflow_gate_nonce: '{workflow.gate_nonce}'
      continuation_rules:
        on_failure: abort
      gate_ref: await_cc_response_legacy

    - id: legacy_read_response
      action_type: call_tool
      parameters:
        tool_id: read_coding_session_response_for_workflow
        args:
          request_id: '{step.legacy_ask_cc.value.request_id}'
      continuation_rules:
        on_failure: abort

    - id: legacy_mark_resolved
      action_type: call_tool
      parameters:
        tool_id: transition_friction_pattern_lifecycle
        args:
          pattern_id: '{idea_payload.pattern_id}'
          new_state: resolved
          resolved_by_spec: self_improvement
      continuation_rules:
        on_failure: abort

    - id: legacy_emit_outcome
      action_type: call_tool
      parameters:
        tool_id: emit_autonomy_loop_event
        args:
          workflow_id: self_improvement
          outcome: '{step.legacy_read_response.value.investigation_outcome}'
          addresses_friction_patterns:
            - '{idea_payload.pattern_id}'
          extra_payload:
            closure_outcome: no_invariant_fallback
      continuation_rules:
        on_failure: abort

# AC16: both paths need their own gate declarations with distinct
# request_id-bound predicates. The closure path's gate matches
# step.ask_cc_closure.value.request_id; the legacy path's gate
# matches step.legacy_ask_cc.value.request_id.
approval_gates:
  - gate_name: await_cc_response_closure
    pause_reason: awaiting coding session response (closure path)
    approval_event_type: coding_consult.response_received
    approval_event_predicate:
      op: eq
      path: payload.request_id
      value: '{step.ask_cc_closure.value.request_id}'
    timeout_seconds: 86400
    bound_behavior_on_timeout: abort_workflow

  - gate_name: await_cc_response_legacy
    pause_reason: awaiting coding session response (legacy path)
    approval_event_type: coding_consult.response_received
    approval_event_predicate:
      op: eq
      path: payload.request_id
      value: '{step.legacy_ask_cc.value.request_id}'
    timeout_seconds: 86400
    bound_behavior_on_timeout: abort_workflow
